<!DOCTYPE html>
<html lang="es">

<title>Pokédex Binder Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--surface3:#2a2a3a;
  --border:rgba(255,255,255,.08);--text:#f0f0f0;--muted:#777;
  --accent:#9B5DE5;--danger:#e74c3c;
  --card-w:72px;--card-h:96px;--gap:5px;--lib-w:290px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Header ── */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;line-height:2;}
.logo em{color:var(--accent);font-style:normal;}
.hdiv{width:1px;height:28px;background:var(--border);flex-shrink:0;}
.size-picker{display:flex;gap:3px;}
.size-btn{padding:4px 9px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.size-btn:hover{color:var(--text);border-color:var(--accent);}
.size-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.hdr-stats{display:flex;gap:16px;}
.stat-val{font-size:16px;font-weight:700;color:#fff;}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;}
.hdr-btn{padding:5px 11px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.hdr-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.hdr-btn.primary{border-color:var(--accent);color:var(--accent);}
.hdr-btn.primary:hover{background:var(--accent);color:#fff;}
.hdr-btn.red{border-color:rgba(231,76,60,.3);color:var(--danger);}
.hdr-btn.red:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* ── Main layout ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── Library ── */
#lib{width:var(--lib-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#lib-top{padding:8px 8px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#lib-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:7px;}
#lib-search::placeholder{color:var(--muted);}
#lib-search:focus{border-color:var(--accent);}
#sec-chips{display:flex;flex-wrap:wrap;gap:3px;}
.sec-chip{padding:2px 7px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.sec-chip:hover{color:var(--text);}
.sec-chip.active{color:#fff;border-color:transparent;}
#gen-chips{display:flex;flex-wrap:wrap;gap:3px;padding:5px 8px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
.gen-chip{padding:2px 7px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.gen-chip:hover{color:var(--text);}
.gen-chip.active{color:#fff;border-color:transparent;}
#lib-count{font-size:9px;color:var(--muted);padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#lib-grid{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;align-content:start;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;}

/* Library card */
.lcard{aspect-ratio:3/4;border-radius:6px;border:1.5px solid rgba(255,255,255,.06);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;position:relative;overflow:hidden;transition:transform .12s,border-color .12s;user-select:none;}
.lcard:hover{transform:scale(1.07);border-color:rgba(255,255,255,.2);}
.lcard:active{transform:scale(.96);}
.lcard img,.lcard .limg{width:50px;height:50px;image-rendering:pixelated;}
.lcard .c-num{font-size:5.5px;color:var(--muted);margin-top:2px;line-height:1;}
.lcard .c-name{font-size:7px;color:var(--text);text-align:center;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.3;}
.lcard.dragging{opacity:.3;transform:scale(.95);}
.lcard.intro-lcard{cursor:grab;}
.lcard.intro-lcard .intro-num{font-family:'Press Start 2P',monospace;font-size:18px;margin-bottom:3px;}
.lcard.intro-lcard .intro-nm{font-family:'Press Start 2P',monospace;font-size:4.5px;line-height:1.7;color:rgba(255,255,255,.8);text-align:center;}

/* Shimmer */
.shim{width:50px;height:50px;border-radius:4px;background-color:rgba(255,255,255,.06);background-image:linear-gradient(90deg,rgba(255,255,255,0) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,0) 75%);background-size:200% 100%;animation:sh 1.4s ease-in-out infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Badge */
.cbadge{position:absolute;top:2px;left:2px;font-size:5px;font-weight:700;padding:1px 3px;border-radius:2px;}
.bm{background:rgba(234,179,8,.9);color:#000;}
.bg{background:rgba(74,222,128,.9);color:#000;}
.br{background:rgba(251,146,60,.9);color:#000;}
.bo{background:rgba(100,149,237,.9);color:#000;}

/* Type borders */
.t-mega{border-color:rgba(234,179,8,.4)!important;}
.t-gmax{border-color:rgba(74,222,128,.4)!important;}
.t-alolan,.t-galarian,.t-hisuian,.t-paldean{border-color:rgba(251,146,60,.4)!important;}
.t-otras{border-color:rgba(100,149,237,.4)!important;}

/* ── Binder ── */
#binder{flex:1;overflow-y:auto;padding:16px 14px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;}
#pages-wrap{display:flex;flex-wrap:wrap;gap:16px;align-content:start;}
#binder-empty{display:none;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--muted);font-size:13px;gap:10px;text-align:center;}
#binder-empty .big{font-size:36px;}

/* Binder page */
.bpage{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;position:relative;flex-shrink:0;}
.bpage-lbl{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--muted);font-size:7px;padding:1px 7px;border-radius:8px;border:1px solid var(--border);white-space:nowrap;}
.bgrid{display:grid;gap:var(--gap);}

/* Binder slot */
.bslot{width:var(--card-w);height:var(--card-h);border-radius:6px;border:1.5px solid rgba(255,255,255,.06);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:grab;user-select:none;transition:border-color .12s;}
.bslot:hover{border-color:rgba(255,255,255,.2);}
.bslot img{width:56px;height:56px;image-rendering:pixelated;}
.bslot .c-num{font-size:6px;color:var(--muted);margin-top:1px;line-height:1;}
.bslot .c-name{font-size:6px;text-align:center;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;line-height:1.3;}
.bslot .cbadge{top:3px;left:auto;right:3px;}
.bslot.bempty{background:rgba(255,255,255,.02);border-style:dashed;opacity:.3;cursor:default;}
.bslot.bempty:hover{border-color:rgba(255,255,255,.06);}
.bslot.bintro{cursor:grab;}
.bslot.dragging{opacity:.25;}

/* Page delete btn */
.bpage-lbl{display:flex;align-items:center;gap:4px;}
.del-page{margin-left:2px;cursor:pointer;color:var(--danger);font-size:9px;opacity:0;transition:opacity .15s;line-height:1;padding:1px 3px;border-radius:3px;}
.del-page:hover{background:var(--danger);color:#fff;}
.bpage:hover .del-page{opacity:1;}

/* Remove btn */
.rm{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;line-height:1;font-weight:700;}
.bslot:not(.bintro):not(.bempty):hover .rm{display:flex;}

/* Drag indicators */
.bslot.dob::before{content:'';position:absolute;left:-5px;top:-3px;bottom:-3px;width:5px;background:var(--accent);border-radius:4px;z-index:10;box-shadow:0 0 10px var(--accent),0 0 20px rgba(155,93,229,.4);}
.bslot.doa::after{content:'';position:absolute;right:-5px;top:-3px;bottom:-3px;width:5px;background:var(--accent);border-radius:4px;z-index:10;box-shadow:0 0 10px var(--accent),0 0 20px rgba(155,93,229,.4);}
.bslot.dob{margin-left:4px;transition:margin .1s;}
.bslot.doa{margin-right:4px;transition:margin .1s;}
.bempty.dob{opacity:.7;border-color:var(--accent)!important;border-style:solid!important;}

/* Intro slot */
.bintro-inner{text-align:center;padding:6px;}
.bintro-roman{font-family:'Press Start 2P',monospace;font-size:16px;display:block;margin-bottom:4px;}
.bintro-name{font-family:'Press Start 2P',monospace;font-size:4.5px;line-height:1.8;color:rgba(255,255,255,.8);}
</style>
</head>

</header>

<div id="main">
  <aside id="lib">

  </aside>

  <main id="binder">

      <div>El binder está vacío</div>

    </div>
    <div id="pages-wrap"></div>
  </main>
</div>

// Ejemplo: 'https://dexoon12.github.io/pokedex-sprites'
// Dejar vacío para usar CDN externo como fallback
const SPRITE_BASE = '';

const SB = n=>SPRITE_BASE?`${SPRITE_BASE}/${n}.png`:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n}.png`;
const SF = a=>SPRITE_BASE?`${SPRITE_BASE}/${a}.png`:`https://play.pokemonshowdown.com/sprites/home/${a}.png`;

// ── State ─────────────────────────────────────────────────────────
let names={}, allCards=[], binder=[], cols=4, rows=4;
let filterSec='all', filterGen=0, filterQ='';
let dragSrc=null; // {from:'lib'|'binder', card, idx}
let dropIdx=null;

// ── Card helpers ──────────────────────────────────────────────────
const cid=c=>c.type==='base'?`base:${c.num}`:c.type==='intro'?`intro:${c.genId}`:`${c.s}:${c.api}`;
const cname=c=>c.name||(names[c.num])||`#${c.num}`;
const cnum=c=>c.dex||c.num||'';
const csprite=c=>c.api?SF(c.api):SB(c.num);

const BADGE={mega:['M','bm'],gmax:['G','bg'],alolan:['A','br'],galarian:['Gl','br'],hisuian:['H','br'],paldean:['P','br'],otras:['O','bo']};

const SEC_INTROS=[
  {type:'intro',_id:'intro:mega',    label:'MEGA',  name:'Mega Evoluciones', color:'#EAB308'},
  {type:'intro',_id:'intro:gmax',    label:'GMAX',  name:'Gigantamax',       color:'#4ADE80'},
  {type:'intro',_id:'intro:alolan',  label:'ALOLA', name:'Formas Alolan',    color:'#F97316'},
  {type:'intro',_id:'intro:galarian',label:'GALAR', name:'Formas Galarian',  color:'#A855F7'},
  {type:'intro',_id:'intro:hisuian', label:'HISUI', name:'Formas Hisuian',   color:'#EF4444'},
  {type:'intro',_id:'intro:paldean', label:'PALDEA',name:'Formas Paldean',   color:'#F15BB5'},
  {type:'intro',_id:'intro:otras',   label:'OTRAS', name:'Otras Formas',     color:'#63A3E9'},
];

// ── Build all cards ────────────────────────────────────────────────
function buildAll(){
  allCards=[];
  GEN_DATA.forEach(g=>allCards.push({type:'intro',genId:g.id,roman:g.roman,name:g.name,color:g.color,_id:`intro:${g.id}`}));
  SEC_INTROS.forEach(s=>allCards.push({...s}));
  for(let n=1;n<=1025;n++) allCards.push({type:'base',num:n});
  FORMS.forEach(f=>allCards.push({...f,type:f.s}));
  allCards.forEach(c=>{ if(!c._id) c._id=cid(c); });
}

// ── Library helpers ───────────────────────────────────────────────
function cardGen(c){
  const n=c.dex||c.num;
  if(!n) return 0;
  const g=GEN_DATA.find(g=>n>=g.from&&n<=g.to);
  return g?g.id:0;
}

function libCards(){
  const inB=new Set(binder.map(c=>c._id));
  let cards=allCards.filter(c=>!inB.has(c._id));
  if(filterSec!=='all') cards=cards.filter(c=>c.type===filterSec||(c.s&&c.s===filterSec));
  if(filterGen>0){
    const g=GEN_DATA[filterGen-1];
    cards=cards.filter(c=>{
      if(c.type==='intro') return c.genId===filterGen;
      const n=c.dex||c.num;
      return n>=g.from&&n<=g.to;
    });
  }
  if(filterQ){
    const q=filterQ.toLowerCase();
    cards=cards.filter(c=>{
      const n=cname(c).toLowerCase();
      return n.includes(q)||String(cnum(c)).includes(q);
    });
  }
  return cards;
}

// ── Render library ─────────────────────────────────────────────────
function renderLib(){
  const grid=document.getElementById('lib-grid');
  const cards=libCards();
  document.getElementById('lib-count').textContent=`${cards.length} disponibles`;
  grid.innerHTML='';
  cards.forEach(card=>{
    const el=document.createElement('div');
    const isIntro=card.type==='intro';
    el.className='lcard'+(isIntro?' intro-lcard':card.s?' t-'+card.s:'');
    el.draggable=true;
    el.title=cname(card);

    if(isIntro){
      el.style.background=`linear-gradient(145deg,${card.color}22,${card.color}44)`;
      el.style.borderColor=card.color+'66';
      el.innerHTML=`<div class="intro-num" style="color:${card.color};font-size:${(card.label||card.roman||'').length>4?'11px':'18px'}">${card.label||card.roman||'?'}</div><div class="intro-nm">${card.name}</div>`;
    } else {
      const b=BADGE[card.s];
      el.innerHTML=`
        ${b?`<div class="cbadge ${b[1]}">${b[0]}</div>`:''}
        <div class="shim" data-src="${csprite(card)}"></div>
        <div class="c-num">#${String(cnum(card)).padStart(4,'0')}</div>
        <div class="c-name">${cname(card).slice(0,13)}</div>`;
    }

    el.addEventListener('click',()=>addToBinder(card));
    el.addEventListener('dragstart',e=>{
      dragSrc={from:'lib',card};
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',()=>{dragSrc=null;el.classList.remove('dragging');});
    grid.appendChild(el);
  });
  lazySprites(grid,'lib');
  updateStats();
}

// ── Binder ops ────────────────────────────────────────────────────
function addToBinder(card,at=null){
  if(binder.find(c=>c._id===card._id)) return;
  at!==null ? binder.splice(at,0,card) : binder.push(card);
  save(); renderBinder(); renderLib();
}
function removeFromBinder(idx){
  binder.splice(idx,1);
  save(); renderBinder(); renderLib();
}
function removePage(p){
  const spp=cols*rows;
  binder.splice(p*spp, Math.min(spp, binder.length-p*spp));
  save(); renderBinder(); renderLib();
}
function moveBinder(from,to){
  if(from===to) return;
  const insertAt=to>from?to-1:to;
  if(insertAt===from) return; // adjacent slot = no-op, skip re-render
  const [card]=binder.splice(from,1);
  binder.splice(insertAt,0,card);
  save(); renderBinder();
}

// ── Render binder ──────────────────────────────────────────────────
function renderBinder(){
  const wrap=document.getElementById('pages-wrap');
  const empty=document.getElementById('binder-empty');
  wrap.innerHTML='';
  if(!binder.length){empty.style.display='flex';updateStats();return;}
  empty.style.display='none';
  const spp=cols*rows;
  const nPages=Math.ceil(binder.length/spp)||1;
  for(let p=0;p<nPages;p++){
    const page=document.createElement('div');
    page.className='bpage';
    const lbl=document.createElement('div');
    lbl.className='bpage-lbl';
    lbl.innerHTML=`Pág. ${p+1} <span class="del-page" title="Eliminar hoja">×</span>`;
    lbl.querySelector('.del-page').addEventListener('click',()=>removePage(p));
    page.appendChild(lbl);
    const grid=document.createElement('div');
    grid.className='bgrid';
    grid.style.gridTemplateColumns=`repeat(${cols},var(--card-w))`;
    grid.style.gridTemplateRows=`repeat(${rows},var(--card-h))`;
    for(let s=0;s<spp;s++){
      const idx=p*spp+s;
      grid.appendChild(idx<binder.length?makeSlot(binder[idx],idx):makeEmpty(idx));
    }
    page.appendChild(grid);
    wrap.appendChild(page);
  }
  lazySprites(wrap,'binder');
  updateStats();
}

function makeSlot(card,idx){
  const el=document.createElement('div');
  if(card.type==='intro'){
    el.className='bslot bintro';
    el.draggable=true;
    el.style.background=`linear-gradient(145deg,${card.color}22,${card.color}44)`;
    el.style.borderColor=card.color+'66';
    const big=card.label||card.roman||'?';
    const fs=big.length>3?'11px':big.length===3?'13px':'16px';
    el.innerHTML=`<div class="bintro-inner"><span class="bintro-roman" style="color:${card.color};font-size:${fs}">${big}</span><span class="bintro-name">${card.name}</span></div>
      <div class="rm" title="Quitar" style="display:none">×</div>`;
    el.addEventListener('mouseenter',()=>el.querySelector('.rm').style.display='flex');
    el.addEventListener('mouseleave',()=>el.querySelector('.rm').style.display='none');
    el.querySelector('.rm').addEventListener('click',e=>{e.stopPropagation();removeFromBinder(idx);});
    el.addEventListener('dragstart',e=>{
      dragSrc={from:'binder',card,idx};
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{dragSrc=null;el.classList.remove('dragging');clearDI();});
    setDropTarget(el,idx);
    return el;
  }
  if(card.type==='filler'){
    el.className='bslot bempty bfiller';
    el.title='Hueco (clic para quitar)';
    el.innerHTML=`<div class="rm" title="Quitar" style="display:none">×</div>`;
    el.addEventListener('mouseenter',()=>el.querySelector('.rm').style.display='flex');
    el.addEventListener('mouseleave',()=>el.querySelector('.rm').style.display='none');
    el.querySelector('.rm').addEventListener('click',e=>{e.stopPropagation();removeFromBinder(idx);});
    setDropTarget(el,idx);
    return el;
  }
  const b=BADGE[card.s];
  const nm=cname(card);
  el.className='bslot'+(card.s?' t-'+card.s:'');
  el.draggable=true;
  el.dataset.idx=idx;
  el.innerHTML=`
    <div class="rm" title="Quitar">×</div>
    ${b?`<div class="cbadge ${b[1]}">${b[0]}</div>`:''}
    <div class="shim" data-src="${csprite(card)}"></div>
    <div class="c-num">#${String(cnum(card)).padStart(4,'0')}</div>
    <div class="c-name">${nm.slice(0,11)}</div>`;
  el.querySelector('.rm').addEventListener('click',e=>{e.stopPropagation();removeFromBinder(idx);});
  el.addEventListener('dragstart',e=>{
    dragSrc={from:'binder',card,idx};
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',()=>{dragSrc=null;el.classList.remove('dragging');clearDI();});
  setDropTarget(el,idx);
  return el;
}

function makeEmpty(idx){
  const el=document.createElement('div');
  el.className='bslot bempty';
  setDropTarget(el,idx);
  return el;
}

function setDropTarget(el,idx){
  el.addEventListener('dragover',e=>{
    if(!dragSrc) return;
    e.preventDefault();
    clearDI();
    const rect=el.getBoundingClientRect();
    let before=e.clientX<rect.left+rect.width/2;
    // Suppress "before" indicator when target is the slot immediately after
    // the drag source — that would be a no-op insert and looks like a swap
    if(dragSrc.from==='binder' && before && idx===dragSrc.idx+1) before=false;
    el.classList.add(before?'dob':'doa');
    dropIdx=before?idx:idx+1;
    e.dataTransfer.dropEffect=dragSrc.from==='lib'?'copy':'move';
  });
  el.addEventListener('dragleave',()=>el.classList.remove('dob','doa'));
  el.addEventListener('drop',e=>{
    e.preventDefault();
    clearDI();
    if(!dragSrc||dropIdx===null) return;
    if(dragSrc.from==='lib'){
      addToBinder(dragSrc.card,Math.min(dropIdx,binder.length));
    } else {
      moveBinder(dragSrc.idx,Math.min(dropIdx,binder.length));
    }
    dropIdx=null;
  });
}

function clearDI(){document.querySelectorAll('.dob,.doa').forEach(e=>e.classList.remove('dob','doa'));}

// ── Sprite cache — prevents flicker on re-render ──────────────────
const spriteCache=new Map(); // url → src (same key, stored for quick lookup)

function applyCacheToShims(root){
  root.querySelectorAll('.shim[data-src]').forEach(sh=>{
    if(!spriteCache.has(sh.dataset.src)) return;
    const img=new Image();
    img.src=sh.dataset.src;
    sh.replaceWith(img);
  });
}

// ── Lazy sprites ──────────────────────────────────────────────────
const _obs={lib:null,binder:null};
function lazySprites(root, key){
  applyCacheToShims(root); // instant for already-loaded sprites
  if(_obs[key]) _obs[key].disconnect();
  _obs[key]=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const sh=e.target;
      _obs[key].unobserve(sh);
      const img=new Image();
      img.src=sh.dataset.src;
      function showImg(imgEl){
        spriteCache.set(sh.dataset.src, 1);
        if(!sh.parentNode) return;
        imgEl.style.opacity='0';
        sh.replaceWith(imgEl);
        requestAnimationFrame(()=>{imgEl.style.transition='opacity .18s';imgEl.style.opacity='1';});
      }
      img.onload=()=>showImg(img);
      img.onerror=()=>{
        // fallback chain: home → gen5 → pokeapi-number → placeholder
        const url=sh.dataset.src;
        if(url.includes('/home/')){
          const img2=new Image();
          img2.src=url.replace('/home/','/gen5/');
          img2.onload=()=>showImg(img2);
          img2.onerror=()=>{if(sh.parentNode){sh.style.opacity='.05';sh.style.animation='none';}};
          return;
        }
        if(sh.parentNode){sh.style.opacity='.05';sh.style.animation='none';}
      };
    });
  },{rootMargin:'150px'});
  root.querySelectorAll('.shim[data-src]').forEach(sh=>_obs[key].observe(sh));
}

// ── Stats ─────────────────────────────────────────────────────────
function updateStats(){
  const spp=cols*rows;
  document.getElementById('s-binder').textContent=binder.length;
  document.getElementById('s-pages').textContent=binder.length?Math.ceil(binder.length/spp):0;
  document.getElementById('s-lib').textContent=libCards().length;
}

// ── Size picker ───────────────────────────────────────────────────
document.getElementById('size-picker').addEventListener('click',e=>{
  const btn=e.target.closest('.size-btn');
  if(!btn) return;
  cols=+btn.dataset.c; rows=+btn.dataset.r;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBinder();
});

// ── Section chips ─────────────────────────────────────────────────
(function buildChips(){
  const wrap=document.getElementById('sec-chips');
  SECS.forEach(sec=>{
    const btn=document.createElement('button');
    btn.className='sec-chip'+(sec.id==='all'?' active':'');
    btn.textContent=sec.label;
    if(sec.color&&sec.id==='all'){ btn.style.background='var(--accent)';btn.style.borderColor='var(--accent)'; }
    btn.addEventListener('click',()=>{
      filterSec=sec.id;
      document.querySelectorAll('.sec-chip').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.borderColor='';b.style.color='';});
      btn.classList.add('active');
      if(sec.color){btn.style.background=sec.color;btn.style.borderColor=sec.color;btn.style.color='#fff';}
      renderLib();
    });
    wrap.appendChild(btn);
  });
  // activate "all" chip visually
  wrap.firstChild.style.background='var(--accent)';
  wrap.firstChild.style.borderColor='var(--accent)';
  wrap.firstChild.style.color='#fff';
})();

// ── Gen chips ────────────────────────────────────────────────────
(function buildGenChips(){
  const wrap=document.getElementById('gen-chips');
  const all=document.createElement('button');
  all.className='gen-chip active';
  all.textContent='Todos';
  all.style.background='var(--accent)';
  all.style.borderColor='var(--accent)';
  all.style.color='#fff';
  all.addEventListener('click',()=>{
    filterGen=0;
    wrap.querySelectorAll('.gen-chip').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.borderColor='';b.style.color='';});
    all.classList.add('active');
    all.style.background='var(--accent)';all.style.borderColor='var(--accent)';all.style.color='#fff';
    renderLib();
  });
  wrap.appendChild(all);
  GEN_DATA.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='gen-chip';
    btn.textContent=g.roman;
    btn.title=g.name;
    btn.style.setProperty('--gc',g.color);
    btn.addEventListener('click',()=>{
      filterGen=g.id;
      wrap.querySelectorAll('.gen-chip').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.borderColor='';b.style.color='';});
      btn.classList.add('active');
      btn.style.background=g.color;btn.style.borderColor=g.color;btn.style.color='#fff';
      renderLib();
    });
    wrap.appendChild(btn);
  });
})();

// ── Search ────────────────────────────────────────────────────────
document.getElementById('lib-search').addEventListener('input',e=>{filterQ=e.target.value;renderLib();});

// ── Agregar hoja ──────────────────────────────────────────────────
document.getElementById('btn-add-page').addEventListener('click',()=>{
  const spp=cols*rows;
  const rem=binder.length%spp;
  const toAdd=rem===0?spp:spp-rem;
  for(let i=0;i<toAdd;i++) binder.push({type:'filler',_id:`filler:${Date.now()}-${i}`});
  save(); renderBinder(); renderLib();
});

// ── Add visibles ──────────────────────────────────────────────────
document.getElementById('btn-add-vis').addEventListener('click',()=>{
  libCards().forEach(c=>{if(!binder.find(b=>b._id===c._id)) binder.push(c);});
  save(); renderBinder(); renderLib();
});

// ── Clear ─────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm('¿Limpiar todo el binder?')) return;
  binder=[]; save(); renderBinder(); renderLib();
});

// ── Export ───────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click',()=>{
  const data={version:1,cols,rows,layout:binder.map(c=>c._id)};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`binder-layout-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
});

// ── Import ───────────────────────────────────────────────────────
document.getElementById('btn-import-wrap').addEventListener('click',()=>document.getElementById('btn-import').click());
document.getElementById('btn-import').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const map={}; allCards.forEach(c=>map[c._id]=c);
      binder=(d.layout||[]).map(id=>map[id]).filter(Boolean);
      if(d.cols&&d.rows){
        cols=d.cols; rows=d.rows;
        document.querySelectorAll('.size-btn').forEach(b=>{
          b.classList.toggle('active',+b.dataset.c===cols&&+b.dataset.r===rows);
        });
      }
      save(); renderBinder(); renderLib();
    }catch{alert('Archivo inválido');}
  };
  reader.readAsText(file);
  e.target.value='';
});

// ── Storage ───────────────────────────────────────────────────────
function save(){
  try{localStorage.setItem('binder-ed-v1',JSON.stringify({cols,rows,layout:binder.map(c=>c._id)}));}catch{}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('binder-ed-v1')||'{}');
    if(!d.layout) return;
    const map={}; allCards.forEach(c=>map[c._id]=c);
    binder=d.layout.map(id=>map[id]).filter(Boolean);
    if(d.cols&&d.rows){
      cols=d.cols; rows=d.rows;
      document.querySelectorAll('.size-btn').forEach(b=>{
        b.classList.toggle('active',+b.dataset.c===cols&&+b.dataset.r===rows);
      });
    }
  }catch{}
}

// ── Init ─────────────────────────────────────────────────────────
async function init(){
  buildAll(); load();
  renderLib(); renderBinder();
  try{
    const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
    const d=await r.json();
    d.results.forEach((p,i)=>{names[i+1]=p.name.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join('-');});
    renderLib(); renderBinder();
  }catch{}
}
init();
</script>
